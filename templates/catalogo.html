<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Autopartes</title>

    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#b30000">
    <link rel="icon" href="/static/icons/icon-192.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
        }

        header {
            background: linear-gradient(90deg, #111, #b30000);
            padding: 25px;
            text-align: center;
            position: relative;
        }

        header h1 {
            font-size: 36px;
        }

        header p {
            color: #ddd;
            margin-top: 8px;
        }

        .login-btn {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #222;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #444;
        }

        .buscador {
            width: 60%;
            display: block;
            margin: 25px auto;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
        }

        .contenedor {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 30px;
            max-width: 1400px;
            margin: auto;
        }

        .producto {
            background: #1b1b1b;
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        .producto img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .info {
            padding: 20px;
        }

        .info h3 {
            color: #ff3333;
        }

        .info p {
            margin: 8px 0;
            color: #ddd;
        }

        .precio {
            font-size: 24px;
            font-weight: bold;
            margin: 15px 0;
        }

        .disponible {
            color: #00cc66;
            font-weight: bold;
        }

        .agotado {
            color: #ff3333;
            font-weight: bold;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #777;
        }

        /* TABLET */
        @media (max-width: 1024px) {
            .contenedor {
                grid-template-columns: repeat(2, 1fr);
            }

            .buscador {
                width: 85%;
            }
        }

        /* CELULAR */
        @media (max-width: 768px) {
            header {
                padding: 20px 15px 70px;
            }

            header h1 {
                font-size: 24px;
            }

            .login-btn {
                position: static;
                display: inline-block;
                margin-top: 15px;
            }

            .buscador {
                width: 92%;
                font-size: 15px;
            }

            .contenedor {
                grid-template-columns: 1fr;
                padding: 15px;
                gap: 20px;
            }

            .producto img {
                height: 200px;
            }

            .precio {
                font-size: 20px;
            }
        }
    </style>
</head>
