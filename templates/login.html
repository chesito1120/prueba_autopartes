<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema Autopartes</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #111827, #164e63, #0ea5e9);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 520px;
            background: rgba(17, 24, 39, 0.96);
            border-radius: 26px;
            padding: 42px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.12);
        }

        .logo-box {
            width: 150px;
            height: 150px;
            background: #e5e7eb;
            border-radius: 24px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .login-card h1 {
            color: #ffffff;
            text-align: center;
            font-size: 30px;
            margin-bottom: 8px;
        }

        .login-card p {
            color: #cbd5e1;
            text-align: center;
            margin-bottom: 30px;
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            background: #f8fafc;
            color: #111827;
            font-size: 15px;
        }

        .login-card input:focus {
            outline: 3px solid rgba(14,165,233,0.35);
            border-color: #0ea5e9;
        }

        .login-card button {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            border: none;
            border-radius: 999px;
            background: linear-gradient(90deg, #2563eb, #0ea5e9);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.25s;
        }

        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(14,165,233,0.35);
        }

        .mensaje-error {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 18px;
            font-weight: bold;
            text-align: center;
        }

        .footer-text {
            margin-top: 24px;
            color: #94a3b8;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .login-card {
                padding: 30px 22px;
            }

            .logo-box {
                width: 120px;
                height: 120px;
            }

            .login-card h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo-box">
        <img src="{{ url_for('static', filename='img/socio3.jpeg') }}" alt="Logo">
    </div>

    <h1>Sistema de Inventario</h1>
    <p>Autopartes CH · Ventas · Préstamos · Catálogo</p>

    {% if error %}
        <div class="mensaje-error">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST">
        <input
            type="email"
            name="correo"
            placeholder="Correo electrónico"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Contraseña"
            required
        >

        <button type="submit">
            Iniciar sesión
        </button>
    </form>

    <p class="footer-text">
        Acceso exclusivo para administradores y vendedores autorizados
    </p>

</div>

</body>
</html>
